# =============================================================================
# OpenG2P Domain Migration Configuration
# =============================================================================
# Use this to migrate from local mode (self-signed certs, *.openg2p.test)
# to custom mode (public domain names, Let's Encrypt certificates).
#
# Usage:
#   cp migrate-config.example.yaml migrate-config.yaml
#   # Edit with your new domain details
#   sudo ./openg2p-migrate-domain.sh --config migrate-config.yaml
#
# Prerequisites:
#   - Infrastructure is running in local mode
#   - DNS A records for the new hostnames point to the VM's public IP
#   - The infra-config.yaml and env-config files are on the VM
# =============================================================================

# ---------------------------------------------------------------------------
# Reference to current infrastructure config
# ---------------------------------------------------------------------------
infra_config: "infra-config.yaml"

# ---------------------------------------------------------------------------
# New domain settings
# ---------------------------------------------------------------------------
new_domain_mode: "custom"

# New hostnames for Rancher and Keycloak
new_rancher_hostname: "rancher.openg2p.org"
new_keycloak_hostname: "keycloak.openg2p.org"

# Let's Encrypt settings for the new domain
letsencrypt_email: "admin@openg2p.org"
# Challenge method: dns (manual), dns-cloudflare, dns-route53, http
letsencrypt_challenge: "dns"
# Cloudflare API token (only if challenge is dns-cloudflare)
cloudflare_api_token: ""

# ---------------------------------------------------------------------------
# Environments to migrate
# ---------------------------------------------------------------------------
# Each environment needs its new base_domain and the path to its config file.
# The config file will be updated in place (backup created automatically).
environments:
  - name: "dev"
    config_file: "env-config.yaml"
    new_base_domain: "dev.openg2p.org"
#  - name: "qa"
#    config_file: "env-qa-config.yaml"
#    new_base_domain: "qa.openg2p.org"
