# =============================================================================
# OpenG2P 3-Node Production Infrastructure Configuration
# =============================================================================
# Copy this file to prod-config.yaml and fill in your values:
#   cp prod-config.example.yaml prod-config.yaml
#
# Then run on your laptop:
#   ./openg2p-prod.sh --probe     --config prod-config.yaml
#   ./openg2p-prod.sh --preflight --config prod-config.yaml
#   ./openg2p-prod.sh             --config prod-config.yaml
#
# This automation does NOT install any DNS server or generate self-signed
# certificates. The customer (govt department / implementer) provides:
#   1. Four DNS A-records pointing to the RP's INTERNAL IP
#   2. TLS certificates for those four hostnames
#   3. Three Ubuntu 24.04 VMs (RP has TWO network interfaces — see docs)
#
# Full prerequisites and requirements:
#   https://docs.openg2p.org/operations/deployment/automation/three-node-automation#prerequisites
# =============================================================================
#
# Tag legend in the comments below:
#   [USER]     — fill in yourself (operator preferences)
#   [CUSTOMER] — provided by the deploying organisation (DNS names + certs)
#   [AWS]      — auto-populated by aws/openg2p-aws-provision.sh
#                (or fill in manually for non-AWS / on-prem installs)
#
# IMPORTANT — about [AWS] fields:
#   If you provisioned with aws/openg2p-aws-provision.sh, it wrote a sibling
#   file `provision-output.yaml` next to this one. The orchestrator auto-detects
#   that file and loads it as an OVERLAY whose values OVERRIDE this file. So you
#   can LEAVE EVERY [AWS] FIELD BLANK — IPs, SSH host/user/key, private_subnet,
#   admin_cidr, wg_endpoint are all picked up from provision-output.yaml.
#   (If you do fill one in here, the provision-output.yaml value still wins —
#   so a stale value here is silently ignored. Leave them blank to avoid that.)
#   You only need to fill [AWS] fields for non-AWS / on-prem installs where no
#   provision-output.yaml exists. The run log prints which mode applied:
#     "Loading provision-output overlay: …"   → [AWS] fields auto-filled
#     "No provision-output.yaml found …"       → you must fill them in here
# =============================================================================

# ---------------------------------------------------------------------------
# Cluster identity                                                       [USER]
# ---------------------------------------------------------------------------
# Display name for the Rancher cluster (also used for NFS export path prefix).
cluster_name: "openg2p"

# ---------------------------------------------------------------------------
# Admin hostnames                                                    [CUSTOMER]
# ---------------------------------------------------------------------------
# The customer's DNS must resolve the admin hostnames to the RP's INTERNAL
# IP (see rp_internal_ip below). Access to these is gated by Wireguard.
#
# Only TWO admin hostnames are exposed: rancher and keycloak. Grafana and
# Prometheus are reached from inside the Rancher UI (Cluster Explorer →
# Monitoring), so they do NOT need their own hostnames or certs.
#
# Single knob — set `public_domain` and both hostnames auto-derive as
# rancher.<public_domain>, keycloak.<public_domain>.
public_domain: ""                # e.g. "openg2p.gov.eth"
#
# Override individually only if your customer uses non-standard names
# (e.g. "k8s-admin.dept.gov" instead of "rancher.openg2p.gov.eth"):
rancher_hostname:    ""          # default: rancher.<public_domain>
keycloak_hostname:   ""          # default: keycloak.<public_domain>

# ---------------------------------------------------------------------------
# TLS certificates                                                   [CUSTOMER]
# ---------------------------------------------------------------------------
# Paths are on YOUR LAPTOP. The script uploads them to the RP at install time.
#
# Supported file formats (auto-detected by extension and contents):
#   • PEM fullchain + key                  *.fullchain.pem + *.key
#   • Separate PEM (cert + chain + key)    *.cert.pem + *.chain.pem + *.key
#   • PFX / P12 (password-protected)       *.pfx / *.p12  (set _password)
#   • ZIP bundle (Sectigo/DigiCert layout) *.zip
#
# TWO ways to configure:
#
# (a) One wildcard cert covering *.<public_domain> (recommended):
tls_wildcard_cert:     ""   # e.g. "./certs/wildcard.fullchain.pem"
tls_wildcard_key:      ""   # e.g. "./certs/wildcard.key"
tls_wildcard_password: ""   # only for PFX/P12 inputs
#
# (b) Per-FQDN certs (leave (a) blank, fill in below) — rancher + keycloak:
tls_rancher_cert:    ""
tls_rancher_key:     ""
tls_rancher_password: ""
tls_keycloak_cert:   ""
tls_keycloak_key:    ""
tls_keycloak_password: ""
#
# To validate certs WITHOUT running an install:
#   ./openg2p-prod.sh --validate-certs --config prod-config.yaml

# ---------------------------------------------------------------------------
# Reverse Proxy node                                                      [AWS]
# ---------------------------------------------------------------------------
# ALL fields in this section are [AWS] — leave blank if provision-output.yaml
# exists (it auto-fills them). Fill in only for non-AWS / on-prem installs.
#
# Single-NIC layout. The RP needs ONE network interface; channel separation
# (public WG endpoint vs admin Nginx) is enforced by the firewall / security
# group, not by physical NICs. See docs for prerequisites:
#   https://docs.openg2p.org/operations/deployment/automation/three-node-automation#prerequisites

rp_public_ip:  ""    # [AWS] WG endpoint — the internet-reachable address.
                     #       On AWS this is the EIP; on-prem it's the public
                     #       IP or whatever address admin laptops dial in to.
rp_private_ip: ""    # [AWS] The RP's primary NIC IP. Admin Nginx binds here;
                     #       WG-decapsulated traffic is delivered here; the
                     #       customer's DNS for rancher/keycloak points here.

# SSH access from the orchestrator (your laptop)
rp_ssh_host: ""       # [AWS] defaults to rp_public_ip if blank
rp_ssh_user: "ubuntu" # [AWS]
rp_ssh_key:  "~/.ssh/id_rsa"   # [AWS]

# ---------------------------------------------------------------------------
# Compute node (Kubernetes)                                               [AWS]
# ---------------------------------------------------------------------------
# [AWS] fields below auto-fill from provision-output.yaml — leave blank when it
# exists. (compute_node_name is [USER].) Fill in only for non-AWS / on-prem.
compute_private_ip: ""            # [AWS]
compute_node_name:  "compute-1"   # [USER]
compute_ssh_host:   ""            # [AWS] defaults to compute_private_ip
compute_ssh_user:   "ubuntu"      # [AWS]
compute_ssh_key:    "~/.ssh/id_rsa"   # [AWS]

# ---------------------------------------------------------------------------
# Storage node (NFS + Postgres host)                                      [AWS]
# ---------------------------------------------------------------------------
# [AWS] fields below auto-fill from provision-output.yaml — leave blank when it
# exists. (storage_node_name is [USER].) Fill in only for non-AWS / on-prem.
storage_private_ip: ""            # [AWS]
storage_node_name:  "storage-1"   # [USER]
storage_ssh_host:   ""            # [AWS] defaults to storage_private_ip
storage_ssh_user:   "ubuntu"      # [AWS]
storage_ssh_key:    "~/.ssh/id_rsa"   # [AWS]

# ---------------------------------------------------------------------------
# SSH bastion (optional)                                                [USER]
# ---------------------------------------------------------------------------
# If your laptop reaches only the RP node directly, set true to bastion
# compute/storage SSH through RP. Not needed when nodes have public IPs.
ssh_jump_via_rp: false

# ---------------------------------------------------------------------------
# Network                                                                 [AWS]
# ---------------------------------------------------------------------------
# Both fields are [AWS] — leave blank/default if provision-output.yaml exists
# (it auto-fills them). Fill in only for non-AWS / on-prem installs.
#
# CIDR covering all 3 nodes' private IPs. Used for ufw rules.
private_subnet: ""       # [AWS] e.g. "10.0.0.0/16"

# Who is allowed to SSH into the public-facing RP node.
# Auto-detected as your laptop's public IP /32 by AWS provisioning.
admin_cidr: "0.0.0.0/0"  # [AWS]

# ---------------------------------------------------------------------------
# Wireguard (admin VPN — server runs on the RP node)
# ---------------------------------------------------------------------------
wg_endpoint: ""              # [AWS] — auto-filled from provision-output.yaml;
                             #         leave blank (defaults to rp_public_ip)
wg_subnet:   "10.15.0.0/16"  # [USER] — must not overlap private_subnet
wg_port:     "51820"         # [USER]
wg_peers:    "8"             # [USER] — how many peer configs to pre-generate

# [USER, optional] DNS resolver pushed to every WG peer. If set, the admin
# laptop sends DNS queries through the tunnel while it's up — useful when the
# admin hostnames (rancher.<domain>, keycloak.<domain>) are resolvable only
# from inside the customer's network (split-horizon DNS, AWS Route53 private
# hosted zone, etc.). The resolver's IP MUST be inside wg_subnet or
# private_subnet so the query actually traverses the tunnel.
#
# Examples:
#   • On-prem with an internal DNS server in the private subnet:
#       wg_peer_dns: "10.0.0.10"
#   • AWS, using the VPC DNS resolver to resolve Route53 private zone
#     records (resolver IP = <vpc-cidr-base>.2 — e.g. 10.0.0.2 for a
#     10.0.0.0/16 VPC, 172.31.0.2 for a 172.31.0.0/16 VPC):
#       wg_peer_dns: "172.31.0.2"
#
# On AWS: leave this BLANK — provisioning auto-fills it with the VPC DNS
# (<vpc-cidr-base>.2) in provision-output.yaml, which overrides this value.
# On-prem: SET it here. If left blank on-prem, the orchestrator prints a
# warning at startup and admins must add a one-time /etc/hosts entry instead
# (the completion summary prints the exact line). See three-node-automation
# docs §3 for the DNS-resolution patterns.
wg_peer_dns: ""              # [USER on-prem; AWS auto-fills]

# ---------------------------------------------------------------------------
# RKE2 / Kubernetes                                                     [USER]
# ---------------------------------------------------------------------------
rke2_version: "v1.33.6+rke2r1"
rke2_token: ""        # auto-generated if blank

# ---------------------------------------------------------------------------
# Rancher                                                               [USER]
# ---------------------------------------------------------------------------
rancher_version:  "2.12.3"
rancher_replicas: "1"

# ---------------------------------------------------------------------------
# Keycloak (admin SSO for Rancher only — runs in-cluster with embedded PG)
# ---------------------------------------------------------------------------
keycloak_replicas: "1"
keycloak_admin_email: ""    # [USER] e.g. "admin@yourcorp.gov.eth"

# ---------------------------------------------------------------------------
# Observability — OpenTelemetry + Grafana Loki (replaces Fluentd/OpenSearch)
# ---------------------------------------------------------------------------
# Cluster logs are collected by an OpenTelemetry agent (DaemonSet), shipped to
# a Grafana Loki store, and viewed in the existing Grafana. PII is redacted in
# the OTel pipeline before logs are stored. Loki uses its own dedicated MinIO
# (internal-only, ClusterIP) so cluster logging is independent of the app stack.
loki_retention_hours:     "168"   # log retention; 168h = 7 days
loki_minio_root_user:     "loki"  # internal-only object store for Loki
loki_minio_root_password: ""      # [USER] set a strong value before install
loki_minio_size:          "50Gi"  # PVC size for Loki's MinIO

# Alerting — critical log/infra alerts route through the existing Alertmanager.
# Leave a channel blank to keep it inactive; fill in to enable it later.
# (WhatsApp is intentionally not supported.)
alert_slack_webhook_url:  ""        # [USER] Slack incoming-webhook URL
alert_slack_channel:      "#alerts" # Slack channel for alerts
alert_smtp_smarthost:     ""        # [USER] e.g. "smtp.example.org:587"
alert_smtp_from:          ""        # [USER] e.g. "alerts@openg2p.org"
alert_smtp_username:      ""        # [USER] SMTP auth user (blank = no auth)
alert_smtp_password:      ""        # [USER] SMTP auth password
alert_smtp_to:            ""        # [USER] recipient, e.g. "ops@openg2p.org"
alert_telegram_bot_token: ""        # [USER] Telegram bot token
alert_telegram_chat_id:   ""        # [USER] Telegram chat/group id (numeric)

# AI layer (optional, OFF by default). When enabled, AI features read logs/
# alerts and use a cloud model via OpenRouter. Disabling it leaves the whole
# observability + alerting stack fully working. PII is redacted before storage.
ai_enabled:           "false"       # set "true" to enable the AI layer
ai_openrouter_api_key: ""           # [USER] OpenRouter API key (required if enabled)
ai_model:             "openrouter/qwen/qwen-2.5-72b-instruct"  # LiteLLM-style model id

# ---------------------------------------------------------------------------
# Storage node — host PostgreSQL (installed; idle until env automation)
# ---------------------------------------------------------------------------
postgres_version: "16"
postgres_listen:  ""    # defaults to storage_private_ip if blank
postgres_port:    "5432"
postgres_superuser_password: ""   # auto-generated if blank, saved at
                                  # /etc/openg2p/secrets/postgres-superuser.env

# ---------------------------------------------------------------------------
# NFS (server on storage node, client on compute node)
# ---------------------------------------------------------------------------
nfs_export_path: "/srv/nfs"
nfs_mount_path:  "/mnt/nfs"
