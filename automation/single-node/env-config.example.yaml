# =============================================================================
# OpenG2P Environment Configuration
# =============================================================================
# Copy this file to env-config.yaml and fill in your values:
#   cp env-config.example.yaml env-config.yaml
#
# Then run:
#   sudo ./openg2p-environment.sh --config env-config.yaml
#
# Prerequisites:
#   Base infrastructure must be set up first (run openg2p-infra.sh)
# =============================================================================

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
# Environment name (used as K8s namespace and Rancher project name).
# Keep it short, lowercase, no hyphens (e.g., dev, qa, staging, pilot).
# You can run this script multiple times with different environments
# to create multiple isolated setups on the same cluster.
environment: "dev"

# Base domain for this environment.
# Modules will be accessible at: <module>.<base_domain>
# Example: dev.openg2p.org → minio.dev.openg2p.org, superset.dev.openg2p.org
#
# Local mode: leave empty to auto-derive as <environment>.<local_domain>
#             (e.g., dev.openg2p.test)
# Custom mode: must be set explicitly (e.g., dev.openg2p.org)
base_domain: ""

# ---------------------------------------------------------------------------
# Infrastructure reference
# ---------------------------------------------------------------------------
# Path to the infra config file (used to inherit node_ip, domain_mode,
# local_domain, keycloak_hostname, letsencrypt settings, etc.)
# Relative paths are resolved from the automation/single-node/ directory.
infra_config: "infra-config.yaml"

# ---------------------------------------------------------------------------
# TLS certificate for this environment (optional override)
# ---------------------------------------------------------------------------
# By default, the tls.method from infra-config.yaml is used.
# Override here only if this environment uses a different cert source.
# For tls.method "provided", set the paths to your wildcard cert:
#   tls:
#     cert: "/path/to/wildcard.fullchain.pem"
#     key: "/path/to/wildcard.privkey.pem"

# ---------------------------------------------------------------------------
# openg2p-commons-base (infrastructure: PostgreSQL, Kafka, MinIO, etc.)
# ---------------------------------------------------------------------------
# Installed first. Provides databases, message queues, and keycloak-init.
commons_base:
  # Chart name in the Helm repo (or local directory name)
  chart_name: "openg2p-commons-base"
  # Path to local chart directory. Leave empty for remote Helm chart.
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm"
  chart_version: "2.0.0-develop"
  # Extra Helm arguments (e.g., "--set postgresql.primary.persistence.size=20Gi")
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# openg2p-commons-services (apps: eSignet, KeyManager, Superset, ODK, etc.)
# ---------------------------------------------------------------------------
# Installed second. Depends on commons-base for PostgreSQL, Redis, etc.
commons_services:
  # Chart name in the Helm repo (or local directory name)
  chart_name: "openg2p-commons-services"
  # Path to local chart directory. Leave empty for remote Helm chart.
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm"
  chart_version: "2.0.0-develop"
  # Extra Helm arguments
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# Modules — set to true/false to enable/disable
# ---------------------------------------------------------------------------
# commons installs both charts above (base + services).
# Must be true if any future module below is true.
modules:
  commons: true
  # Future modules (not yet implemented in automation):
  # registry: false
  # pbms: false
  # spar: false
  # g2p_bridge: false
