# =============================================================================
# OpenG2P Base Infrastructure Configuration
# =============================================================================
# Copy this file to infra-config.yaml and fill in your values:
#   cp infra-config.example.yaml infra-config.yaml
#
# Then run:
#   sudo ./openg2p-infra.sh --config infra-config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Node and cluster configuration
# ---------------------------------------------------------------------------
# Internal/private IP address of this VM (used for NFS, Nginx, K8s)
node_ip: ""

# A short name for this K8s node (used in RKE2 node-name, visible in kubectl get nodes)
node_name: "node1"

# Display name for the Rancher cluster (shown in the Rancher UI).
# Also used as the NFS export path prefix (/srv/nfs/<cluster_name>).
cluster_name: "openg2p"

# ---------------------------------------------------------------------------
# Local domain
# ---------------------------------------------------------------------------
# This is a local-only sandbox. No public domain names or DNS provider are
# needed. The script sets up:
#   • dnsmasq on the VM for local DNS (*.<local_domain>)
#   • A local Certificate Authority with self-signed certs
#   • Wireguard DNS push so VPN clients resolve hostnames automatically
# All hostnames are auto-derived as <service>.<local_domain>
# (e.g. rancher.openg2p.test). Rancher uses LOCAL authentication — create
# admin users directly in Rancher (☰ → Users & Authentication → Users).
#
# Uses the .test TLD (reserved by RFC 2606 for testing, avoids mDNS conflicts).
#
# TLS: ALL certificates are SELF-SIGNED by the built-in local CA. There is no
# option to supply your own certificate or use Let's Encrypt / a public CA —
# this is a sandbox. Trust the CA on your client (/etc/openg2p/ca/ca.crt) or
# accept the browser warning.
local_domain: "openg2p.test"

# ---------------------------------------------------------------------------
# Public access (security-sensitive)
# ---------------------------------------------------------------------------
# Controls who can reach the web UIs (Rancher + environment services on 80/443).
#
#   false (default) — PRIVATE. Even if this VM has a public IP, the sandbox is
#                     reachable only over Wireguard or from inside the VPC. The
#                     firewall blocks 80/443 from the public Internet. This is
#                     the recommended, safe default.
#
#   true            — PUBLIC. Opens 80/443 to 0.0.0.0/0 so anyone who can route
#                     to the public IP (and adds the hostnames to their
#                     /etc/hosts, accepting the self-signed cert) can reach the
#                     sandbox WITHOUT the VPN.
#
#   ⚠️  SECURITY WARNING: Setting this to true exposes the Rancher cluster-admin
#       UI and every environment service to the public Internet, protected only
#       by a self-signed certificate and local passwords. This is a sandbox, not
#       a hardened deployment — only enable it if you understand and accept the
#       risk, and prefer restricting the source IPs (ufw / cloud security group)
#       to the specific addresses that need access.
#       On AWS you must ALSO open 80/443 in the security group (see the docs).
public_access: false

# ---------------------------------------------------------------------------
# RKE2 Kubernetes
# ---------------------------------------------------------------------------
# RKE2 version to install (see: https://github.com/rancher/rke2/releases)
rke2_version: "v1.33.6+rke2r1"

# RKE2 cluster token (auto-generated if left empty)
rke2_token: ""

# ---------------------------------------------------------------------------
# Wireguard VPN
# ---------------------------------------------------------------------------
wireguard:
  # Public IP or hostname that VPN clients use to connect.
  # If your VM has a public IP different from node_ip, set it here.
  # Leave empty to use node_ip (works when clients are on the same network).
  endpoint: ""
  subnet: "10.15.0.0/16"
  port: "51820"
  peers: "254"

# ---------------------------------------------------------------------------
# Rancher
# ---------------------------------------------------------------------------
rancher:
  version: "2.12.3"
  replicas: "1"
  # Admin password is auto-managed — do not set here.
  # On fresh install: auto-generated and saved to K8s secret cattle-system/rancher-secret
  # On re-run: read from the K8s secret
  # Override: RANCHER_ADMIN_PASSWORD=xxx sudo ./openg2p-infra.sh ...

# Note: Keycloak is NOT installed at the infra level. Rancher uses local
# authentication. The OpenG2P apps' Keycloak is deployed per-environment by
# openg2p-environment.sh (at keycloak.<environment domain>), not here.

# ---------------------------------------------------------------------------
# Observability — OpenTelemetry + Grafana Loki (replaces Fluentd/OpenSearch)
# ---------------------------------------------------------------------------
# Cluster logs are collected by an OpenTelemetry agent (DaemonSet), shipped to
# a Grafana Loki store, and viewed in the existing Grafana. PII is redacted in
# the OTel pipeline before storage. Loki uses its own dedicated MinIO.
loki_retention_hours:     "168"   # log retention; 168h = 7 days
loki_minio_root_user:     "loki"  # internal-only object store for Loki
loki_minio_root_password: ""      # auto-generated if blank (saved under /etc/openg2p/secrets)
loki_minio_size:          "50Gi"  # PVC size for Loki's MinIO

# Alerting — critical log/infra alerts route through the existing Alertmanager.
# Leave a channel blank to keep it inactive; fill in to enable it later.
alert_slack_webhook_url:  ""        # Slack / Mattermost / Rocket.Chat webhook
alert_slack_channel:      "#alerts"
alert_smtp_smarthost:     ""        # e.g. "smtp.example.org:587"
alert_smtp_from:          ""        # e.g. "alerts@openg2p.org"
alert_smtp_username:      ""        # SMTP auth user (blank = no auth)
alert_smtp_password:      ""
alert_smtp_to:            ""        # recipient, e.g. "ops@openg2p.org"
alert_telegram_bot_token: ""
alert_telegram_chat_id:   ""        # numeric chat/group id

# AI layer (optional, OFF by default). Disabling leaves observability working.
ai_enabled:           "false"
ai_openrouter_api_key: ""
ai_model:             "openrouter/qwen/qwen-2.5-72b-instruct"
