# =============================================================================
# OpenG2P Deployment Plan
# =============================================================================
# A single source of truth that lists EVERYTHING a customer must procure to
# bring up an OpenG2P installation end-to-end:
#
#   - DNS A records (admin + every planned environment)
#   - TLS certificates (admin + every planned environment)
#   - Server access (SSH, kubectl)
#
# Fill this out ONCE at the very start of a deployment — before infrastructure
# automation runs — and feed it to:
#
#   ./generate-procurement-checklist.sh --plan deployment-plan.yaml
#
# That produces a single printable checklist that you hand to the customer's
# network / cert / IT team. Procurement cycles (especially TLS cert issuance
# from sovereign or commercial CAs) can take 2-4 weeks; planning all
# environments upfront avoids running the procurement process multiple times.
#
# Adding more environments later? Just append to this file and regenerate the
# checklist — only the new envs will need DNS + cert procurement.
# =============================================================================

# ---------------------------------------------------------------------------
# Organisation
# ---------------------------------------------------------------------------
# Used only in the printed checklist for clarity.
organization: "Country X Ministry of Social Welfare"

# ---------------------------------------------------------------------------
# Infrastructure (admin hostnames + cluster topology)
# ---------------------------------------------------------------------------

# Public IP of the Reverse-Proxy / Nginx node.
# Every DNS A record (admin + env wildcards) points here.
nginx_node_ip: "10.0.1.10"

# Internal IP of the Reverse-Proxy node (admin Nginx server blocks bind here;
# reachable only via Wireguard). Optional — leave blank for single-NIC setups.
nginx_internal_ip: ""

# Admin hostnames — required for Rancher and (optionally) shared Keycloak.
# Customer must provide DNS A records and TLS certs for these.
rancher_hostname: "rancher.openg2p.gov.example"

# Set only if you run a shared admin Keycloak; in the new commons model each
# environment has its own in-namespace Keycloak, so this can be left blank.
keycloak_hostname: ""

# ---------------------------------------------------------------------------
# Environments
# ---------------------------------------------------------------------------
# Comma-separated list of environment names you plan to create on this
# cluster. For each name listed here, you must also set an
# `env_<name>_base_domain` key below.
#
# Typical lists:
#   dev,qa,prod                 — three-tier
#   sandbox,prod                — minimal
#   dev,uat,prod                — gov-tier naming
environments: "dev,qa,prod"

# Base domain per environment. Each environment requires TWO DNS A records
# (base + wildcard) and ONE wildcard TLS certificate.
#
#   env_dev_base_domain: "dev.openg2p.gov.example"
#       → A record:  dev.openg2p.gov.example       → nginx_node_ip
#       → A record:  *.dev.openg2p.gov.example     → nginx_node_ip
#       → Cert:      *.dev.openg2p.gov.example  (wildcard, includes apex)
env_dev_base_domain:  "dev.openg2p.gov.example"
env_qa_base_domain:   "qa.openg2p.gov.example"
env_prod_base_domain: "prod.openg2p.gov.example"

# ---------------------------------------------------------------------------
# Cert placement convention
# ---------------------------------------------------------------------------
# Where the customer's certs should be placed on the Nginx node. The
# checklist prints these paths; install scripts read certs from here.
#
# Standard layout:
#   /etc/openg2p/certs/<domain>/fullchain.pem   (mode 644)
#   /etc/openg2p/certs/<domain>/privkey.pem     (mode 600)
cert_base_path: "/etc/openg2p/certs"

# ---------------------------------------------------------------------------
# Server access (informational — used in the checklist)
# ---------------------------------------------------------------------------
ssh_user: "ubuntu"
admin_workstation_cidr: "203.0.113.5/32"   # who can SSH to the Nginx node
