# =============================================================================
# OpenG2P Environment Configuration for Multi-Node Setup
# =============================================================================
# Copy this file to env-config.yaml and fill in your values:
#   cp env-config.example.yaml env-config.yaml
#
# Used by: env-cluster.sh (run from your workstation with kubectl access)
#
# PREREQUISITES — must already be in place before env-cluster.sh runs:
#   1. DNS A records (apex + wildcard) pointing to the Nginx node
#   2. Wildcard TLS cert for *.<base_domain> on the Nginx node at
#         /etc/openg2p/certs/<base_domain>/{fullchain.pem,privkey.pem}
#   3. Nginx server block on the Nginx node proxying to the Istio ingress
#
# Customer-provided certs (from a commercial / sovereign CA) are the default
# for production. Let's Encrypt is acceptable only for sandbox / PoC.
#
# DNS records, TLS certs, server access, firewall ports — all listed on a
# single fillable checklist you can hand to your IT / network / cert team:
#   https://docs.openg2p.org/operations/deployment/prerequisites-procurement
#   https://docs.openg2p.org/operations/deployment/environment-setup-multi-node
# =============================================================================

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
# Environment name — used as K8s namespace and Rancher project name.
# Keep it short, lowercase, no hyphens (e.g., dev, qa, staging, pilot).
environment: "qa"

# Base domain for this environment.
# Modules will be accessible at: <module>.<base_domain>
# Example: qa.openg2p.org → minio.qa.openg2p.org, superset.qa.openg2p.org
base_domain: "qa.openg2p.org"

# Email for the default admin user in the Keycloak 'staff' realm.
# Maps to the chart value: keycloak-init.realms.staff.users[0].email
# This is the user the DevOps / system admin will use to log in to the
# per-env Keycloak. Leave empty to accept the chart default.
admin_email: "admin@openg2p.org"

# ---------------------------------------------------------------------------
# openg2p-commons-base (PostgreSQL, Kafka, MinIO, Redis, SoftHSM, Keycloak, etc.)
# ---------------------------------------------------------------------------
commons_base:
  chart_name: "openg2p-commons-base"
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm/rancher"
  chart_version: "0.0.0-develop"
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# openg2p-commons-services (eSignet, KeyManager, Superset, ODK, etc.)
# ---------------------------------------------------------------------------
commons_services:
  chart_name: "openg2p-commons-services"
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm/rancher"
  chart_version: "0.0.0-develop"
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# Modules — enable/disable
# ---------------------------------------------------------------------------
modules:
  commons: true
  # Future modules (not yet implemented):
  # registry: false
  # pbms: false
  # spar: false
  # g2p_bridge: false
