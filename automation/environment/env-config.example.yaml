# =============================================================================
# OpenG2P Multi-Node Environment Configuration
# =============================================================================
# Copy this file to env-config.yaml and fill in your values:
#   cp env-config.example.yaml env-config.yaml
#
# Used by: env-cluster.sh (run from your workstation with kubectl access)
#
# Before running env-cluster.sh, complete the manual Nginx setup steps
# described in the README.
# =============================================================================

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
# Environment name — used as K8s namespace and Rancher project name.
# Keep it short, lowercase, no hyphens (e.g., dev, qa, staging, pilot).
environment: "qa"

# Base domain for this environment.
# Modules will be accessible at: <module>.<base_domain>
# Example: qa.openg2p.org → minio.qa.openg2p.org, superset.qa.openg2p.org
base_domain: "qa.openg2p.org"

# ---------------------------------------------------------------------------
# Keycloak
# ---------------------------------------------------------------------------
# Hostname of the shared Keycloak instance (from the infra setup).
keycloak_hostname: "keycloak.openg2p.org"

# Client-manager credentials — created during infrastructure setup.
# These are needed to create Keycloak clients for this environment's services.
keycloak:
  client_manager_user: "client-manager@openg2p.org"
  client_manager_password: ""

# ---------------------------------------------------------------------------
# openg2p-commons-base (PostgreSQL, Kafka, MinIO, OpenSearch, Redis, etc.)
# ---------------------------------------------------------------------------
commons_base:
  chart_name: "openg2p-commons-base"
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm"
  chart_version: "2.0.0-develop"
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# openg2p-commons-services (eSignet, KeyManager, Superset, ODK, etc.)
# ---------------------------------------------------------------------------
commons_services:
  chart_name: "openg2p-commons-services"
  chart_path: ""
  chart_repo: "https://openg2p.github.io/openg2p-helm"
  chart_version: "2.0.0-develop"
  extra_helm_args: ""

# ---------------------------------------------------------------------------
# Modules — enable/disable
# ---------------------------------------------------------------------------
modules:
  commons: true
  # Future modules (not yet implemented):
  # registry: false
  # pbms: false
  # spar: false
  # g2p_bridge: false
