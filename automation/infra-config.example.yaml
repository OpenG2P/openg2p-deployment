# =============================================================================
# OpenG2P Base Infrastructure Configuration
# =============================================================================
# Copy this file to infra-config.yaml and fill in your values:
#   cp infra-config.example.yaml infra-config.yaml
#
# Then run:
#   sudo ./openg2p-infra.sh --config infra-config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Node configuration
# ---------------------------------------------------------------------------
# Internal/private IP address of this VM (used for NFS, Nginx, K8s)
node_ip: ""

# A short name for this node (used in K8s node labels and NFS paths)
# Example: openg2p-dev
node_name: "openg2p"

# ---------------------------------------------------------------------------
# Domain mode
# ---------------------------------------------------------------------------
# Controls how hostnames and TLS certificates are set up.
#
#   "custom" (default) — You provide your own domain names and DNS records.
#                         TLS certificates are obtained via Let's Encrypt.
#                         Required for production and public-facing deployments.
#                         You must fill in rancher_hostname, keycloak_hostname,
#                         and the TLS section below.
#
#   "local"            — No domain names or DNS needed. The script sets up:
#                         • dnsmasq on the VM for local DNS (*.openg2p.test)
#                         • A local Certificate Authority with self-signed certs
#                         • Wireguard DNS push so VPN clients resolve automatically
#                         Hostnames are auto-derived:
#                           rancher.openg2p.test, keycloak.openg2p.test
#                         Great for sandboxes, demos, pilots, and air-gapped setups.
#                         Can be migrated to "custom" later.
domain_mode: "custom"

# Local domain base (only used when domain_mode is "local")
# All hostnames will be <service>.<local_domain>
# Uses .test TLD (reserved by RFC 2606 for testing, avoids mDNS conflicts)
local_domain: "openg2p.test"

# ---------------------------------------------------------------------------
# Domain configuration (only needed when domain_mode is "custom")
# ---------------------------------------------------------------------------
# Rancher management UI hostname
# Example: rancher.openg2p.org
rancher_hostname: ""

# Keycloak authentication hostname
# Example: keycloak.openg2p.org
keycloak_hostname: ""

# ---------------------------------------------------------------------------
# TLS / Let's Encrypt (only needed when domain_mode is "custom")
# ---------------------------------------------------------------------------
# Email address for Let's Encrypt certificate registration
letsencrypt_email: ""

# Certificate challenge method:
#   "dns"            — DNS-01 challenge (recommended). The script will pause and
#                      ask you to create a TXT record at your DNS provider.
#                      Works even if port 80 is not open. Supports wildcards.
#   "dns-cloudflare" — Automated DNS-01 via Cloudflare API. Requires
#                      cloudflare_api_token to be set below. Fully hands-off.
#   "dns-route53"    — Automated DNS-01 via AWS Route 53. Requires
#                      AWS credentials configured on the machine.
#   "http"           — HTTP-01 challenge. Requires port 80 open to the internet.
#                      Simplest but least likely to work in restricted networks.
letsencrypt_challenge: "dns"

# Cloudflare API token (only needed if letsencrypt_challenge is "dns-cloudflare")
# Create a token at: https://dash.cloudflare.com/profile/api-tokens
# Token must have "Zone:DNS:Edit" permission for your domain.
cloudflare_api_token: ""

# ---------------------------------------------------------------------------
# RKE2 Kubernetes
# ---------------------------------------------------------------------------
# RKE2 version to install (see: https://github.com/rancher/rke2/releases)
rke2_version: "v1.33.6+rke2r1"

# RKE2 cluster token (auto-generated if left empty)
rke2_token: ""

# ---------------------------------------------------------------------------
# Wireguard VPN
# ---------------------------------------------------------------------------
wireguard:
  # Public IP or hostname that VPN clients use to connect.
  # If your VM has a public IP different from node_ip, set it here.
  # Leave empty to use node_ip (works when clients are on the same network).
  endpoint: ""
  subnet: "10.15.0.0/16"
  port: "51820"
  peers: "254"
  # Subnet that Wireguard clients can access (AllowedIPs in peer config)
  # Default "0.0.0.0/0" routes all traffic through VPN
  # Set to your node's subnet (e.g. "172.16.0.0/24") to route only cluster traffic
  cluster_subnet: ""

# ---------------------------------------------------------------------------
# Rancher
# ---------------------------------------------------------------------------
rancher:
  version: "2.12.3"
  replicas: "1"

# ---------------------------------------------------------------------------
# Keycloak
# ---------------------------------------------------------------------------
keycloak:
  replicas: "1"
